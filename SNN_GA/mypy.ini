[mypy]  # Start of global mypy configuration

# Specify the Python version used in your project
python_version = 3.10.5

# Disable dumping type statistics (used for internal mypy diagnostics)
dump_type_stats = False

# Disable dumping inference statistics (used for internal mypy diagnostics)
dump_inference_stats = False

# Enable incremental mode to speed up repeated checks by caching results
incremental = True

# Disallow functions without type annotations (enforces explicit typing)
disallow_untyped_defs = True

# Allow calling functions that lack type annotations (more flexible)
disallow_untyped_calls = False

# Disable strict checking of Optional types (less strict about None handling)
strict_optional = False

# Ignore missing imports to avoid errors from third-party libraries without type hints
ignore_missing_imports = True